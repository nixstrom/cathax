name: Assign pets to feeders

on:
  schedule:
    - cron: "0 0,4,8,12,16 * * *" # every 4h from 02:00 CEST; skips 22:00 CEST (20 UTC)
  workflow_dispatch: # allow manual runs

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - run: deno run --allow-net --allow-env src/main.ts
        env:
          SUREHUB_TOKEN: ${{ secrets.SUREHUB_TOKEN }}
